# ablaut - Portainer pinned tag stack (recommended for production redeploys)
#
# How to use:
# 1. In Portainer: Stacks -> ablaut-studio -> Editor (or Add stack).
# 2. Paste this file.
# 3. Set ALL values in Portainer -> Environment variables (see .env.example).
#    This file uses ${VAR} everywhere — nothing secret is hardcoded here.
# 4. Redeploy — keep volumes ablaut_db and ablaut_uploads (do NOT delete them).
#
# Safe production defaults (set in Portainer env):
#   PAYLOAD_DB_PUSH=false
#   PAYLOAD_RUN_MIGRATIONS=true
#   PAYLOAD_WAIT_FOR_DB=true
#
# Upgrade: change only the Git tag in build.context below, then redeploy.
# Rollback: change the tag back to the previous known-good release and redeploy.
# Current pin: ablaut-v0.3.1
#
# LL-HLS compatibility fallback is enabled by default (redis + livekit-egress included).
# Disable with FEATURE_HLS_EGRESS=false in Portainer env if you do not want egress.

name: ablaut-studio

services:
  app:
    build:
      context: https://github.com/silvansan/ablaut-Studio.git#ablaut-v0.3.1
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      DATABASE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PAYLOAD_DB_PUSH: ${PAYLOAD_DB_PUSH:-false}
      PAYLOAD_RUN_MIGRATIONS: ${PAYLOAD_RUN_MIGRATIONS:-true}
      PAYLOAD_WAIT_FOR_DB: ${PAYLOAD_WAIT_FOR_DB:-true}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-}
      LIVEKIT_USE_EXTERNAL_IP: ${LIVEKIT_USE_EXTERNAL_IP:-false}
      FEATURE_HLS_EGRESS: ${FEATURE_HLS_EGRESS:-true}
      LIVEKIT_EGRESS_ENABLED: ${LIVEKIT_EGRESS_ENABLED:-true}
      HLS_PUBLIC_BASE_URL: ${HLS_PUBLIC_BASE_URL:-}
      HLS_SEGMENTS_DIR: ${HLS_SEGMENTS_DIR:-/app/hls-segments}
      HLS_EGRESS_OUTPUT_DIR: ${HLS_EGRESS_OUTPUT_DIR:-/out}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      INITIAL_SUPER_ADMIN_EMAIL: ${INITIAL_SUPER_ADMIN_EMAIL:-}
      INITIAL_SUPER_ADMIN_PASSWORD: ${INITIAL_SUPER_ADMIN_PASSWORD:-}
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      livekit:
        condition: service_started
      redis:
        condition: service_started
      livekit-egress:
        condition: service_started
    volumes:
      - ablaut_uploads:/app/media
      - ablaut_hls_segments:/app/hls-segments
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/api/health?deep=1').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:v1.12.0
    depends_on:
      redis:
        condition: service_started
    command:
      - --config-body
      - |
        port: 7880
        bind_addresses:
          - 0.0.0.0
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: ${LIVEKIT_USE_EXTERNAL_IP:-false}
        redis:
          address: redis:6379
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    ports:
      - '7880:7880'
      - '7881:7881'
      - '50000-50100:50000-50100/udp'
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ablaut_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  hls-volume-init:
    image: busybox:1.36
    user: '0:0'
    volumes:
      - ablaut_hls_segments:/out
    command: ['sh', '-c', 'chmod 1777 /out']
    restart: 'no'

  livekit-egress:
    image: livekit/egress:v1.12.0
    cap_add:
      - SYS_ADMIN
    depends_on:
      hls-volume-init:
        condition: service_completed_successfully
      livekit:
        condition: service_started
      redis:
        condition: service_started
    environment:
      EGRESS_CONFIG_BODY: |
        log_level: info
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        insecure: true
        health_port: 9090
        template_base: https://livekit.io/egress-template
        redis:
          address: redis:6379
        file_output:
          local:
            directory: /out
    volumes:
      - ablaut_hls_segments:/out
    restart: unless-stopped

volumes:
  ablaut_db:
  ablaut_uploads:
  ablaut_hls_segments:
