# ablaut - Portainer pinned tag stack
#
# Use this variant when you want safer rollback from Portainer.
# Change only the tag suffix when upgrading:
#   https://github.com/silvansan/ablaut-Studio.git#ablaut-v0.2.0
#
# Rollback means changing the tag back to the previous known-good tag and redeploying.
# Keep the stack name, database name, credentials, and volumes stable.

name: ablaut-studio

services:
  app:
    build:
      context: https://github.com/silvansan/ablaut-Studio.git#ablaut-v0.2.0
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PAYLOAD_SECRET: CHANGE_ME_LONG_RANDOM_PAYLOAD_SECRET_MIN_32_CHARS
      DATABASE_URI: postgres://ablaut:CHANGE_ME_DB_PASSWORD@db:5432/ablaut
      POSTGRES_USER: ablaut
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASSWORD
      POSTGRES_DB: ablaut
      PAYLOAD_DB_PUSH: 'false'
      PAYLOAD_RUN_MIGRATIONS: 'true'
      PAYLOAD_WAIT_FOR_DB: 'true'
      NEXT_PUBLIC_APP_URL: https://ablaut.example.com
      PUBLIC_BASE_URL: https://ablaut.example.com
      LIVEKIT_API_KEY: ablaut
      LIVEKIT_API_SECRET: CHANGE_ME_LONG_RANDOM_LIVEKIT_SECRET
      LIVEKIT_URL: wss://livekit.example.com
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL:-}
      LIVEKIT_USE_EXTERNAL_IP: ${LIVEKIT_USE_EXTERNAL_IP:-true}
      FEATURE_HLS_EGRESS: ${FEATURE_HLS_EGRESS:-true}
      LIVEKIT_EGRESS_ENABLED: ${LIVEKIT_EGRESS_ENABLED:-true}
      HLS_PUBLIC_BASE_URL: ${HLS_PUBLIC_BASE_URL:-https://ablaut.example.com/hls}
      HLS_SEGMENTS_DIR: ${HLS_SEGMENTS_DIR:-/app/hls-segments}
      HLS_EGRESS_OUTPUT_DIR: ${HLS_EGRESS_OUTPUT_DIR:-/out}
      SMTP_HOST: smtp.example.com
      SMTP_PORT: '587'
      SMTP_USER: CHANGE_ME_SMTP_USER
      SMTP_PASS: CHANGE_ME_SMTP_PASSWORD
      SMTP_FROM: noreply@example.com
      INITIAL_SUPER_ADMIN_EMAIL: admin@example.com
      INITIAL_SUPER_ADMIN_PASSWORD: CHANGE_ME_FIRST_ADMIN_PASSWORD
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      livekit:
        condition: service_started
      redis:
        condition: service_started
      livekit-egress:
        condition: service_started
    volumes:
      - ablaut_uploads:/app/media
      - ablaut_hls_segments:/app/hls-segments
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/api/health?deep=1').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:v1.12.0
    depends_on:
      redis:
        condition: service_started
    command:
      - --config-body
      - |
        port: 7880
        bind_addresses:
          - 0.0.0.0
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
        redis:
          address: redis:6379
        keys:
          ablaut: CHANGE_ME_LONG_RANDOM_LIVEKIT_SECRET
    ports:
      - '7880:7880'
      - '7881:7881'
      - '50000-50100:50000-50100/udp'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  hls-volume-init:
    image: busybox:1.36
    user: '0:0'
    volumes:
      - ablaut_hls_segments:/out
    command: ['sh', '-c', 'chmod 1777 /out']
    restart: 'no'

  livekit-egress:
    image: livekit/egress:v1.12.0
    cap_add:
      - SYS_ADMIN
    depends_on:
      hls-volume-init:
        condition: service_completed_successfully
      livekit:
        condition: service_started
      redis:
        condition: service_started
    environment:
      EGRESS_CONFIG_BODY: |
        log_level: info
        api_key: ablaut
        api_secret: CHANGE_ME_LONG_RANDOM_LIVEKIT_SECRET
        ws_url: ws://livekit:7880
        insecure: true
        health_port: 9090
        template_base: https://livekit.io/egress-template
        redis:
          address: redis:6379
        file_output:
          local:
            directory: /out
    volumes:
      - ablaut_hls_segments:/out
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ablaut
      POSTGRES_PASSWORD: CHANGE_ME_DB_PASSWORD
      POSTGRES_DB: ablaut
    volumes:
      - ablaut_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ablaut_db:
  ablaut_uploads:
  ablaut_hls_segments:
