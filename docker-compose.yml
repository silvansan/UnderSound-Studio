services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URI: postgres://undersound:undersound@db:5432/undersound
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - undersound_uploads:/app/media
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: undersound
      POSTGRES_PASSWORD: undersound
      POSTGRES_DB: undersound
    ports:
      - '5432:5432'
    volumes:
      - undersound_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U undersound -d undersound']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  maildev:
    image: maildev/maildev:2.1.0
    ports:
      - '1080:1080'
      - '1025:1025'
    profiles:
      - mail
    restart: unless-stopped

volumes:
  undersound_db:
  undersound_uploads:
