name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  playwright:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ablaut
          POSTGRES_PASSWORD: ablaut
          POSTGRES_DB: ablaut
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ablaut -d ablaut"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URI: postgres://ablaut:ablaut@localhost:5432/ablaut
      ABLAUT_RUN_DB_TESTS: 'true'
      PAYLOAD_SECRET: ci-test-secret-minimum-32-characters-long
      PAYLOAD_DB_PUSH: 'true'
      PAYLOAD_RUN_MIGRATIONS: 'true'
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PUBLIC_BASE_URL: http://localhost:3000
      LIVEKIT_URL: ws://localhost:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      CI: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
