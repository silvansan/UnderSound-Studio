# Local development: Postgres + LiveKit + Maildev (app runs on host via `npm run dev`)
name: ablaut-studio

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ablaut}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ablaut}
      POSTGRES_DB: ${POSTGRES_DB:-ablaut}
    ports:
      - '5432:5432'
    volumes:
      - ablaut_db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 5

  maildev:
    image: maildev/maildev:2.1.0
    ports:
      - '1080:1080'
      - '1025:1025'
    profiles:
      - mail

  livekit:
    image: livekit/livekit-server:v1.9.1
    command:
      - --config-body
      - |
        port: 7880
        bind_addresses:
          - 0.0.0.0
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: false
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-secret}
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
    ports:
      - '7880:7880'
      - '7881:7881'
      - '50000-50100:50000-50100/udp'

volumes:
  ablaut_db:
